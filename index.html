<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic -->
    <title>FIB Badges</title>
    <meta name="description" content="Create custom FIB badges quickly and easily." />

    <!-- Canonical -->
    <link rel="canonical" href="https://fibbadges.com/" />

    <!-- Open Graph (THIS is what Discord/WhatsApp/Facebook use) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FIB Badges" />
    <meta property="og:description" content="Create custom FIB badges quickly and easily." />
    <meta property="og:url" content="https://fibbadges.com/" />
    <meta property="og:site_name" content="FIB Badges" />

    <!-- REQUIRED for proper embeds -->
    <meta property="og:image" content="https://fibbadges.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter (also used by some apps) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FIB Badges" />
    <meta name="twitter:description" content="Create custom FIB badges quickly and easily." />
    <meta name="twitter:image" content="https://fibbadges.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
